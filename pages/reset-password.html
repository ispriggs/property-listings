<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password · Ecovilla Rentals</title>
    <link rel="icon" href="https://res.cloudinary.com/dnyttsork/image/upload/w_64,h_64,c_fit,q_auto,f_png/v1780872499/ChatGPT_Image_Jun_7_2026_04_48_01_PM_yenmzg">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dnyttsork/image/upload/w_180,h_180,c_fit,q_auto,f_png/v1780872499/ChatGPT_Image_Jun_7_2026_04_48_01_PM_yenmzg">
    <meta name="theme-color" content="#2d4a38">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ecovilla Rentals">
    <style>
        :root {
            --forest: #2d4a38;
            --forest-light: #3a5c47;
            --clay: #c06e3a;
            --cream: #f7f3eb;
            --parchment: #ebe2d3;
            --stone: #6e6a63;
            --charcoal: #2a2520;
            --white: #ffffff;
            --font-display: Georgia, 'Times New Roman', serif;
            --font-body: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --ease: cubic-bezier(.25, .46, .45, .94);
            --dur: 240ms;
            --radius: 12px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: 16px; }

        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--charcoal);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(42, 37, 32, .12);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--forest);
            text-decoration: none;
            margin-bottom: 36px;
        }

        .heading {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .subheading {
            font-size: .875rem;
            color: var(--stone);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .field { margin-bottom: 16px; }

        .field label {
            display: block;
            font-size: .72rem;
            font-weight: 500;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--stone);
            margin-bottom: 7px;
        }

        .field input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--parchment);
            border-radius: var(--radius);
            font-size: 1rem; /* ≥16px prevents iOS zoom */
            font-family: var(--font-body);
            color: var(--charcoal);
            background: var(--cream);
            transition: border-color var(--dur);
        }

        .field input:focus {
            outline: none;
            border-color: var(--clay);
            background: var(--white);
        }

        .field-error {
            font-size: .75rem;
            color: #c0392b;
            margin-top: 5px;
            display: none;
        }

        .field-error.visible { display: block; }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--forest);
            color: var(--white);
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 500;
            font-family: var(--font-body);
            cursor: pointer;
            margin-top: 8px;
            transition: background var(--dur) var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover { background: var(--forest-light); }
        .btn:disabled { opacity: .6; cursor: not-allowed; }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }

        .spinner.on { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: .875rem;
            margin-bottom: 20px;
            display: none;
        }

        .alert.visible { display: block; }
        .alert.error { background: #fdf0ef; border: 1px solid #f5c6c2; color: #c0392b; }
        .alert.success { background: #edf7f0; border: 1px solid #b8dfc4; color: #2e7d32; }

        .back-link {
            display: block;
            text-align: center;
            font-size: .8rem;
            color: var(--stone);
            margin-top: 24px;
            text-decoration: none;
        }

        .back-link:hover { color: var(--charcoal); }

        /* Error state: no token found */
        .error-state { text-align: center; }
        .error-state p { color: var(--stone); font-size: .9rem; line-height: 1.6; margin-bottom: 24px; }

        @media (max-width: 480px) {
            body { align-items: flex-start; padding: 0; }
            .card { border-radius: 0; min-height: 100vh; padding: 40px 24px; }
        }
    </style>
</head>
<body>

<div class="card">
    <a href="../index.html" class="logo">
        <img src="https://res.cloudinary.com/dnyttsork/image/upload/q_auto,f_auto/v1780872499/ChatGPT_Image_Jun_7_2026_04_48_01_PM_yenmzg" alt="Ecovilla Rentals" style="height:36px;width:auto">
        Ecovilla Rentals
    </a>

    <!-- Main form — shown when token is present -->
    <div id="form-wrap">
        <h1 class="heading">Set new password</h1>
        <p class="subheading">Choose a strong password for your account.</p>

        <div class="alert" id="alert"></div>

        <div class="field">
            <label for="new-pw">New password</label>
            <input type="password" id="new-pw" placeholder="Min. 8 characters" autocomplete="new-password" />
            <div class="field-error" id="new-pw-error"></div>
        </div>
        <div class="field">
            <label for="confirm-pw">Confirm password</label>
            <input type="password" id="confirm-pw" placeholder="Repeat password" autocomplete="new-password" />
            <div class="field-error" id="confirm-pw-error"></div>
        </div>

        <button class="btn" id="submit-btn" onclick="handleSubmit()">
            <span id="btn-text">Update Password</span>
            <div class="spinner" id="spinner"></div>
        </button>

        <a href="login.html" class="back-link">← Back to Sign In</a>
    </div>

    <!-- Shown when no valid token found -->
    <div id="error-state" class="error-state" style="display:none">
        <h1 class="heading" style="margin-bottom:16px">Link expired</h1>
        <p>This password reset link has expired or already been used.<br>Please request a new one.</p>
        <a href="login.html" class="btn" style="text-decoration:none;display:flex">Back to Sign In</a>
    </div>
</div>

<script>
    var SUPABASE_URL  = 'https://wywmdgelflstnqfgslqw.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5d21kZ2VsZmxzdG5xZmdzbHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTQxODIsImV4cCI6MjA5NDk3MDE4Mn0.7SAsWpGvYDV-aRaHagt_tBFiSkbNL-Vuc3gHLSs8o9E';

    // Parse the hash Supabase put in the URL
    var hash   = window.location.hash.slice(1);
    var params = Object.fromEntries(
        hash.split('&').filter(Boolean).map(function (p) {
            return p.split('=').map(decodeURIComponent);
        })
    );

    var accessToken = params.access_token || null;

    // Clean the tokens out of the URL bar immediately
    history.replaceState(null, '', window.location.pathname);

    // No token → show error state
    if (!accessToken || params.type !== 'recovery') {
        document.getElementById('form-wrap').style.display  = 'none';
        document.getElementById('error-state').style.display = 'block';
    }

    function fieldErr(id, msg) {
        var el = document.getElementById(id);
        el.textContent = msg;
        el.classList.toggle('visible', !!msg);
    }

    function showAlert(msg, type) {
        var el = document.getElementById('alert');
        el.textContent = msg;
        el.className = 'alert visible ' + (type || 'error');
    }

    async function handleSubmit() {
        fieldErr('new-pw-error', '');
        fieldErr('confirm-pw-error', '');

        var pw      = document.getElementById('new-pw').value;
        var confirm = document.getElementById('confirm-pw').value;

        if (pw.length < 8) { fieldErr('new-pw-error', 'Password must be at least 8 characters'); return; }
        if (pw !== confirm) { fieldErr('confirm-pw-error', 'Passwords do not match'); return; }

        var btn     = document.getElementById('submit-btn');
        var spinner = document.getElementById('spinner');
        var text    = document.getElementById('btn-text');
        btn.disabled = true;
        spinner.classList.add('on');
        text.textContent = '';

        try {
            var res = await fetch(SUPABASE_URL + '/auth/v1/user', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    apikey: SUPABASE_ANON,
                    Authorization: 'Bearer ' + accessToken
                },
                body: JSON.stringify({ password: pw })
            });

            if (!res.ok) {
                var err = await res.json();
                throw new Error(err.message || err.msg || 'Failed to update password');
            }

            // Success — show confirmation then redirect to login
            document.getElementById('form-wrap').innerHTML =
                '<div style="text-align:center;padding:16px 0">' +
                '<div style="font-size:3rem;margin-bottom:16px">✅</div>' +
                '<h2 style="font-family:var(--font-display);font-size:1.8rem;font-weight:500;margin-bottom:12px">Password updated!</h2>' +
                '<p style="color:var(--stone);font-size:.9rem;margin-bottom:28px">You can now sign in with your new password.</p>' +
                '<a href="login.html" style="display:flex;align-items:center;justify-content:center;background:var(--forest);color:white;padding:14px;border-radius:12px;text-decoration:none;font-weight:500">Go to Sign In →</a>' +
                '</div>';

        } catch (err) {
            showAlert(err.message || 'Something went wrong. Please request a new reset link.');
            btn.disabled = false;
            spinner.classList.remove('on');
            text.textContent = 'Update Password';
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') handleSubmit();
    });
</script>

</body>
</html>
