<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecovilla Community Map · San Mateo</title>
  <link rel="icon"
    href="https://res.cloudinary.com/dnyttsork/image/upload/w_64,h_64,c_fit,q_auto,f_png/v1780872499/ChatGPT_Image_Jun_7_2026_04_48_01_PM_yenmzg">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
  <script type="module" src="../js/lib/auth.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, 'DM Sans', sans-serif;
      background: #081408;
      color: #d4edcc;
      height: 100dvh;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
    }

/* ── Right controls ──────────────────────────────────────────── */
    #controls-right {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-btn {
      background: rgba(8, 20, 8, 0.92);
      color: #d4edcc;
      border: 1px solid rgba(106, 171, 94, 0.35);
      border-radius: 8px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      backdrop-filter: blur(6px);
    }

    .map-btn:hover {
      background: rgba(106, 171, 94, 0.18);
      border-color: #6aab5e;
    }

    #style-toggle {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.07em;
    }

    /* ── Landmarks slide-up panel ────────────────────────────────── */
    #panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 40;
      display: none;
      cursor: pointer;
    }

    #panel-backdrop.open {
      display: block;
    }

    #landmarks-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 41;
      background: rgba(8, 20, 8, 0.98);
      border-top: 1px solid rgba(106, 171, 94, 0.3);
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(.25, .46, .45, .94);
      max-height: 72vh;
      overflow-y: auto;
    }

    #landmarks-panel.open {
      transform: translateY(0);
    }

    .panel-handle {
      width: 36px;
      height: 4px;
      background: rgba(106, 171, 94, 0.35);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 10px;
      border-bottom: 1px solid rgba(106, 171, 94, 0.15);
    }

    .panel-header h3 {
      font-size: 0.94rem;
      font-weight: 600;
      color: #d4edcc;
    }

    .panel-close-btn {
      background: none;
      border: none;
      color: #6aab5e;
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
    }

    .panel-close-btn:hover {
      background: rgba(106, 171, 94, 0.12);
    }

    .panel-group-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      color: #6aab5e;
      text-transform: uppercase;
      padding: 14px 20px 4px;
    }

    .landmark-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      color: #d4edcc;
      transition: background 0.12s;
    }

    .landmark-row:hover {
      background: rgba(106, 171, 94, 0.08);
    }

    .landmark-row-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: rgba(106, 171, 94, 0.1);
      border: 1px solid rgba(106, 171, 94, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .landmark-row-name {
      font-size: 0.875rem;
      font-weight: 500;
    }

    /* ── Lot selection bottom sheet ─────────────────────────────── */
    #lot-sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 40;
      display: none;
      cursor: pointer;
    }

    #lot-sheet-backdrop.open { display: block; }

    #lot-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 41;
      background: rgba(8, 20, 8, 0.99);
      border-top: 1px solid rgba(106, 171, 94, 0.3);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(.25, .46, .45, .94);
    }

    #lot-sheet.open { transform: translateY(0); }

    .lot-sheet-inner {
      padding: 8px 24px 40px;
    }

    .lot-sheet-label {
      font-size: 1rem;
      font-weight: 700;
      color: #d4edcc;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    .lot-sheet-sub {
      font-size: 0.875rem;
      color: #8aad84;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .lot-sheet-sub strong { color: #d4edcc; }

    .lot-sheet-actions {
      display: flex;
      gap: 12px;
    }

    .lot-sheet-btn-secondary {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(106, 171, 94, 0.35);
      background: transparent;
      color: #d4edcc;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .lot-sheet-btn-secondary:hover { background: rgba(106, 171, 94, 0.1); }

    .lot-sheet-btn-primary {
      flex: 2;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #6aab5e;
      color: #081408;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .lot-sheet-btn-primary:hover { background: #7dbf71; }

    /* ── Get directions button (standalone host mode) ───────────── */
    #directions-btn {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      max-width: 400px;
      margin: 0 auto;
      z-index: 10;
      background: #6aab5e;
      color: #081408;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: background 0.15s;
    }

    #directions-btn:hover { background: #7dbf71; }

    /* Push share banner above the directions button when both visible */
    #share-banner { bottom: 84px; }

    /* ── Route from entrance banner ─────────────────────────────── */
    #route-banner {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 72px;
      z-index: 10;
      background: rgba(200, 90, 40, 0.92);
      border: 1px solid rgba(240, 140, 80, 0.55);
      border-radius: 8px;
      padding: 7px 8px 7px 12px;
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: #fff;
      font-weight: 500;
      backdrop-filter: blur(6px);
    }

    #route-banner .route-clear {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.75);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0 4px;
      line-height: 1;
      flex-shrink: 0;
    }

    #route-banner .route-clear:hover {
      color: #fff;
    }

    /* ── Share / copy banner ─────────────────────────────────────── */
    #share-banner {
      position: absolute;
      bottom: 80px;
      left: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(8, 20, 8, 0.95);
      border: 1px solid rgba(106, 171, 94, 0.45);
      border-radius: 10px;
      padding: 9px 13px;
      display: none;
      align-items: center;
      gap: 10px;
      max-width: 560px;
      margin: 0 auto;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    #share-label {
      font-size: 0.65rem;
      color: #6aab5e;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #share-url-text {
      font-size: 0.76rem;
      color: #a5cfa0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: monospace;
    }

    #copy-btn {
      background: #6aab5e;
      color: #081408;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s;
    }

    #copy-btn:hover {
      background: #7dbf71;
    }

    /* ── GPS nudge toast ─────────────────────────────────────────────── */
    #gps-nudge {
      position: absolute;
      bottom: 88px;
      left: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(8, 20, 8, 0.96);
      border: 1px solid rgba(106, 171, 94, 0.45);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      transform: translateY(12px);
    }

    #gps-nudge.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #gps-nudge-text {
      font-size: 0.84rem;
      color: #d4edcc;
      line-height: 1.4;
      flex: 1;
      min-width: 160px;
    }

    #gps-nudge-btn {
      background: #6aab5e;
      color: #081408;
      border: none;
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s;
    }

    #gps-nudge-btn:hover { background: #7dbf71; }

    #gps-nudge-dismiss {
      background: none;
      border: none;
      color: rgba(212, 237, 204, 0.4);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }

    #gps-nudge-dismiss:hover { color: #d4edcc; }

    /* ── Access overlay ─────────────────────────────────────────────── */
    #access-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(8, 20, 8, 0.82);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #access-overlay.show {
      display: flex;
    }

    #access-card {
      background: rgba(8, 20, 8, 0.97);
      border: 1px solid rgba(106, 171, 94, 0.35);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 360px;
      width: 100%;
    }

    #access-card svg {
      color: #6aab5e;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    #access-card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #d4edcc;
      margin-bottom: 6px;
      text-align: center;
    }

    #access-card .access-sub {
      font-size: 0.82rem;
      color: #8aad84;
      line-height: 1.5;
      margin-bottom: 24px;
      text-align: center;
    }

    #access-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #access-form input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(106, 171, 94, 0.3);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 0.9rem;
      color: #d4edcc;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }

    #access-form input::placeholder { color: rgba(212,237,204,0.35); }
    #access-form input:focus { border-color: #6aab5e; }

    #access-submit {
      background: #6aab5e;
      color: #081408;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
      margin-top: 4px;
    }

    #access-submit:hover { background: #7dbf71; }
    #access-submit:disabled { opacity: 0.6; cursor: default; }

    #access-error {
      font-size: 0.8rem;
      color: #e07060;
      text-align: center;
      min-height: 1.2em;
    }

    /* ── Landmark map markers ────────────────────────────────────── */
    .lm-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }

    .lm-pin {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: rgba(8, 20, 8, 0.9);
      border: 1.5px solid #6aab5e;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      transition: transform 0.1s, border-color 0.1s;
    }

    .lm-marker:hover .lm-pin {
      transform: scale(1.12);
      border-color: #8fd080;
    }

    .lm-label {
      background: rgba(8, 20, 8, 0.85);
      color: #d4edcc;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    /* ── Mapbox control theme overrides ──────────────────────────── */
    .mapboxgl-ctrl-group {
      background: rgba(8, 20, 8, 0.92) !important;
      border: 1px solid rgba(106, 171, 94, 0.3) !important;
      border-radius: 8px !important;
      overflow: hidden !important;
      box-shadow: none !important;
    }

    .mapboxgl-ctrl-group button {
      background: transparent !important;
      width: 32px !important;
      height: 32px !important;
    }

    .mapboxgl-ctrl-group button:hover {
      background: rgba(106, 171, 94, 0.14) !important;
    }

    .mapboxgl-ctrl-group button+button {
      border-top: 1px solid rgba(106, 171, 94, 0.18) !important;
    }

    .mapboxgl-ctrl-zoom-in .mapboxgl-ctrl-icon,
    .mapboxgl-ctrl-zoom-out .mapboxgl-ctrl-icon,
    .mapboxgl-ctrl-compass .mapboxgl-ctrl-icon {
      filter: invert(85%) sepia(20%) saturate(300%) hue-rotate(80deg) brightness(0.9);
    }

    .mapboxgl-ctrl-scale {
      background: rgba(8, 20, 8, 0.82) !important;
      color: #6aab5e !important;
      border-color: rgba(106, 171, 94, 0.45) !important;
      font-size: 0.62rem !important;
    }

    .mapboxgl-ctrl-attrib {
      background: rgba(8, 20, 8, 0.65) !important;
    }

    .mapboxgl-ctrl-attrib a,
    .mapboxgl-ctrl-attrib-inner {
      color: rgba(106, 171, 94, 0.7) !important;
      font-size: 0.62rem !important;
    }

    .mapboxgl-ctrl-attrib-button {
      filter: invert(1);
    }

    /* ── GPS button states ───────────────────────────────────────────── */
    #gps-btn.locating {
      border-color: #6aab5e;
      background: rgba(106, 171, 94, 0.18);
    }

    #gps-btn.locating svg {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #gps-btn.tracking {
      border-color: #6aab5e;
      background: rgba(106, 171, 94, 0.28);
      color: #6aab5e;
    }

    /* ── Navigation instruction banner ───────────────────────────────── */
    #nav-banner {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 72px;
      z-index: 10;
      background: rgba(8, 20, 8, 0.96);
      border: 1px solid rgba(106, 171, 94, 0.5);
      border-radius: 12px;
      padding: 10px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      max-width: 480px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.55);
    }

    #nav-arrow {
      font-size: 1.5rem;
      line-height: 1;
      flex-shrink: 0;
      color: #6aab5e;
    }

    #nav-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #nav-instruction {
      font-size: 0.88rem;
      font-weight: 700;
      color: #d4edcc;
    }

    #nav-distance {
      font-size: 0.7rem;
      color: #6aab5e;
      letter-spacing: 0.04em;
    }

    #voice-btn {
      background: none;
      border: 1px solid rgba(106, 171, 94, 0.28);
      color: rgba(212, 237, 204, 0.45);
      border-radius: 6px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      margin-left: 2px;
    }

    #voice-btn:hover {
      background: rgba(106, 171, 94, 0.1);
    }

    #voice-btn.active {
      color: #6aab5e;
      border-color: rgba(106, 171, 94, 0.6);
    }

    /* ── User location dot ───────────────────────────────────────────── */
    .user-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4a90d9;
      border: 2.5px solid #fff;
      box-shadow: 0 0 0 0 rgba(74, 144, 217, 0.6);
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(74, 144, 217, 0.6); }
      70%  { box-shadow: 0 0 0 10px rgba(74, 144, 217, 0); }
      100% { box-shadow: 0 0 0 0 rgba(74, 144, 217, 0); }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- Access control overlay -->
  <div id="access-overlay">
    <div id="access-card">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <h2>Host &amp; admin access</h2>
      <p class="access-sub">Guests should use the link from their booking confirmation email.</p>
      <form id="access-form" novalidate>
        <input id="access-email" type="email" placeholder="Email" autocomplete="email" required>
        <input id="access-password" type="password" placeholder="Password" autocomplete="current-password" required>
        <p id="access-error"></p>
        <button id="access-submit" type="submit">Log in</button>
      </form>
    </div>
  </div>


  <!-- Right controls: hamburger + style toggle -->
  <div id="controls-right">
    <button class="map-btn" id="menu-btn" aria-label="Community landmarks" title="Landmarks">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <button class="map-btn" id="style-toggle" aria-label="Toggle map style">MAP</button>
    <button class="map-btn" id="gps-btn" aria-label="Go to my location" title="My location">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" stroke-opacity="0"/>
      </svg>
    </button>
  </div>

  <!-- Landmarks panel -->
  <!-- Lot selection bottom sheet (embedded/host mode) -->
  <div id="lot-sheet-backdrop" role="presentation"></div>
  <div id="lot-sheet" role="dialog" aria-modal="true" aria-label="Add location to listing">
    <div class="panel-handle" aria-hidden="true"></div>
    <div class="lot-sheet-inner">
      <p class="lot-sheet-label">Add location to listing</p>
      <p class="lot-sheet-sub">Lot <strong id="lot-sheet-id"></strong> will be linked to this property.</p>
      <div class="lot-sheet-actions">
        <button id="lot-sheet-close" class="lot-sheet-btn-secondary">Close</button>
        <button id="lot-sheet-add" class="lot-sheet-btn-primary">Add location</button>
      </div>
    </div>
  </div>

  <div id="panel-backdrop" role="presentation"></div>
  <aside id="landmarks-panel" role="dialog" aria-label="Community landmarks" aria-modal="true">
    <div class="panel-handle" aria-hidden="true"></div>
    <div class="panel-header">
      <h3>Community Landmarks</h3>
      <button class="panel-close-btn" id="panel-close" aria-label="Close landmarks">&#x2715;</button>
    </div>
    <div id="panel-body" role="list"></div>
  </aside>

  <!-- Get directions button (standalone host mode) -->
  <button id="directions-btn">

    // ── Select a lot ──────────────────────────────────────────────────

    // ── Route from Main Entrance ──────────────────────────────────────

    function lotCentroid(feature) {
      const ring = feature.geometry.type === 'MultiPolygon'
        ? feature.geometry.coordinates[0][0]
        : feature.geometry.coordinates[0];
      const n = ring.length;
      return [
        ring.reduce((s, c) => s + c[0], 0) / n,
        ring.reduce((s, c) => s + c[1], 0) / n,
      ];
    }

    // ── Road graph / Dijkstra pathfinder ─────────────────────────────

    function _coordKey(c) { return c[0].toFixed(7) + ',' + c[1].toFixed(7); }

    function _distM(a, b) {
      const R = 6371000, rad = Math.PI / 180;
      const dLat = (b[1] - a[1]) * rad, dLng = (b[0] - a[0]) * rad;
      const lat1 = a[1] * rad, lat2 = b[1] * rad;
      const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
    }

    function buildRoadGraph(roads) {
      const nodes = new Map();
      const adj = new Map();
      const nodeToFi = new Map();

      function ensure(c, fi) {
        const k = _coordKey(c);
        if (!nodes.has(k)) { nodes.set(k, c); adj.set(k, []); nodeToFi.set(k, fi); }
        return k;
      }
      function link(k1, k2) {
        const d = _distM(nodes.get(k1), nodes.get(k2));
        adj.get(k1).push({ to: k2, dist: d });
        adj.get(k2).push({ to: k1, dist: d });
      }

      const routingFeats = roads.features.filter(f => f.geometry?.type === 'LineString');

      routingFeats.forEach((f, fi) => {
        const cs = f.geometry.coordinates;
        cs.forEach(c => ensure(c, fi));
        for (let i = 0; i < cs.length - 1; i++) link(_coordKey(cs[i]), _coordKey(cs[i + 1]));
      });

      // Connect junction endpoints from different sections within 30 m
      const keys = [...nodes.keys()];
      for (let i = 0; i < keys.length; i++) {
        for (let j = i + 1; j < keys.length; j++) {
          if (nodeToFi.get(keys[i]) === nodeToFi.get(keys[j])) continue;
          const d = _distM(nodes.get(keys[i]), nodes.get(keys[j]));
          if (d < 30 && !adj.get(keys[i]).some(e => e.to === keys[j])) link(keys[i], keys[j]);
        }
      }
      return { nodes, adj, routingFeats };
    }

    // Project coord p onto segment a→b; return the closest point on segment
    function _projectToSeg(p, a, b) {
      const dx = b[0] - a[0], dy = b[1] - a[1];
      const lenSq = dx * dx + dy * dy;
      if (lenSq === 0) return a.slice();
      const t = Math.max(0, Math.min(1, ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / lenSq));
      return [a[0] + t * dx, a[1] + t * dy];
    }

    // Add coord as a temporary node snapped onto the nearest road segment
    function _snapInject(g, feats, coord, prefix) {
      let best = null;
      feats.forEach(f => {
        if (!f.geometry || f.geometry.type !== 'LineString') return;
        const cs = f.geometry.coordinates;
        for (let i = 0; i < cs.length - 1; i++) {
          const pt = _projectToSeg(coord, cs[i], cs[i + 1]);
          const d = _distM(coord, pt);
          if (!best || d < best.d) {
            best = { d, pt, kA: _coordKey(cs[i]), kB: _coordKey(cs[i + 1]) };
          }
        }
      });
      if (!best) return null;
      const k = prefix + ':' + best.pt[0].toFixed(7) + ',' + best.pt[1].toFixed(7);
      g.nodes.set(k, best.pt);
      g.adj.set(k, []);
      const dA = _distM(best.pt, g.nodes.get(best.kA));
      const dB = _distM(best.pt, g.nodes.get(best.kB));
      g.adj.get(k).push({ to: best.kA, dist: dA }, { to: best.kB, dist: dB });
      g.adj.get(best.kA).push({ to: k, dist: dA });
      g.adj.get(best.kB).push({ to: k, dist: dB });
      return k;
    }

    // O(n²) Dijkstra — fast enough for this size of road network
    function _dijkstra(g, startKey, endKey) {
      const dist = new Map(), prev = new Map();
      g.nodes.forEach((_, k) => dist.set(k, Infinity));
      dist.set(startKey, 0);
      const unvisited = new Set(g.nodes.keys());
      while (unvisited.size) {
        let u = null, best = Infinity;
        unvisited.forEach(k => { if (dist.get(k) < best) { best = dist.get(k); u = k; } });
        if (!u || best === Infinity) break;
        if (u === endKey) break;
        unvisited.delete(u);
        for (const { to, dist: w } of g.adj.get(u)) {
          const nd = best + w;
          if (nd < dist.get(to)) { dist.set(to, nd); prev.set(to, u); }
        }
      }
      if (dist.get(endKey) === Infinity) return null;
      const path = [];
      for (let c = endKey; c !== undefined; c = prev.get(c)) path.unshift(g.nodes.get(c));
      return path;
    }

    function buildRouteCoords(feature, startCoord) {
      if (!roadGraph) return null;
      const start    = startCoord || LANDMARKS[0].coords;
      const centroid = lotCentroid(feature);
      const g = {
        nodes: new Map(roadGraph.nodes),
        adj: new Map([...roadGraph.adj].map(([k, v]) => [k, v.slice()])),
      };
      const kStart = _snapInject(g, roadGraph.routingFeats, start, 'S');
      const kEnd   = _snapInject(g, roadGraph.routingFeats, centroid, 'E');
      if (!kStart || !kEnd) return null;
      const path = _dijkstra(g, kStart, kEnd);
      if (!path || path.length < 2) return null;
      return [start, ...path, centroid];
    }

    async function _fetchRoadRoute(from, to) {
      try {
        const url = `https://api.mapbox.com/directions/v5/mapbox/driving/`
          + `${from[0]},${from[1]};${to[0]},${to[1]}`
          + `?geometries=geojson&overview=full&access_token=${MAPBOX_TOKEN}`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        return data.routes?.[0]?.geometry?.coordinates || null;
      } catch (_) { return null; }
    }

    async function showRoute(feature, startCoord) {
      const entrance = LANDMARKS[0].coords;
      let coords;

      if (startCoord && _distM(startCoord, entrance) > 300) {
        // User is outside the community — fetch real road directions to the gate,
        // then stitch on the internal community road route to the lot.
        const [externalCoords, internalCoords] = await Promise.all([
          _fetchRoadRoute(startCoord, entrance),
          Promise.resolve(buildRouteCoords(feature, entrance)),
        ]);
        if (externalCoords && internalCoords) {
          // Drop the last point of the external leg (the entrance) to avoid duplication
          coords = [...externalCoords.slice(0, -1), ...internalCoords];
        } else {
          coords = buildRouteCoords(feature, startCoord) || [startCoord, lotCentroid(feature)];
        }
      } else {
        const fallbackStart = startCoord || entrance;
        coords = buildRouteCoords(feature, startCoord) || [fallbackStart, lotCentroid(feature)];
      }

      routeData = {
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: coords },
      };
      if (map.getSource('route')) {
        map.getSource('route').setData(routeData);
      } else {
        map.addSource('route', { type: 'geojson', data: routeData });
        addRouteLayers();
      }
      document.getElementById('directions-btn').style.display = 'none';
      navSteps = buildInstructions(coords);
      navStepIdx = 0;
      lastVoiceStepIdx = -1; voiceWarned = false; voiceExecuted = false;
      if (gpsWatchId !== null && userMarker) {
        updateNavBanner(userMarker.getLngLat().toArray());
      }
    }

    function addRouteLayers() {
      map.addLayer({
        id: 'route-casing', type: 'line', source: 'route',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: { 'line-color': '#ffffff', 'line-width': 7, 'line-opacity': 0.5 },
      });
      map.addLayer({
        id: 'route-line', type: 'line', source: 'route',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: { 'line-color': '#f07840', 'line-width': 3.5, 'line-dasharray': [2, 2.5], 'line-opacity': 1 },
      });
    }

    function clearRoute() {
      routeData = null;
      if (map.getLayer('route-line')) map.removeLayer('route-line');
      if (map.getLayer('route-casing')) map.removeLayer('route-casing');
      if (map.getSource('route')) map.removeSource('route');
      document.getElementById('route-banner').style.display = 'none';
      navSteps = [];
      navStepIdx = 0;
      window.speechSynthesis?.cancel();
      lastVoiceStepIdx = -1; voiceWarned = false; voiceExecuted = false;
      document.getElementById('nav-banner').style.display = 'none';
    }

    // ── Style toggle ──────────────────────────────────────────────────
    document.getElementById('style-toggle').addEventListener('click', () => {
      isSatellite = !isSatellite;
      map.setStyle(isSatellite
        ? 'mapbox://styles/mapbox/satellite-streets-v12'
        : 'mapbox://styles/mapbox/streets-v12');
      document.getElementById('style-toggle').textContent = isSatellite ? 'MAP' : 'SAT';
    });

    // ── Landmarks panel ───────────────────────────────────────────────
    (function buildPanel() {
      const body = document.getElementById('panel-body');
      const groups = {};
      LANDMARKS.forEach(lm => {
        if (!groups[lm.group]) groups[lm.group] = [];
        groups[lm.group].push(lm);
      });

      Object.entries(groups).forEach(([group, items]) => {
        const label = document.createElement('div');
        label.className = 'panel-group-label';
        label.textContent = group;
        label.setAttribute('role', 'presentation');
        body.appendChild(label);

        items.forEach(lm => {
          const btn = document.createElement('button');
          btn.className = 'landmark-row';
          btn.setAttribute('role', 'listitem');
          btn.innerHTML = `
            <div class="landmark-row-icon" style="border-color:${lm.color};background:${lm.color}1a">${makeSvg(lm.svg, lm.color)}</div>
            <span class="landmark-row-name">${lm.name}</span>
          `;
          btn.addEventListener('click', () => {
            map.flyTo({ center: lm.coords, zoom: 17, duration: 1000 });
            closePanel();
          });
          body.appendChild(btn);
        });
      });
    })();

    function openPanel() {
      document.getElementById('landmarks-panel').classList.add('open');
      document.getElementById('panel-backdrop').classList.add('open');
    }
    function closePanel() {
      document.getElementById('landmarks-panel').classList.remove('open');
      document.getElementById('panel-backdrop').classList.remove('open');
    }

    function dismissNudge() {
      document.getElementById('gps-nudge').classList.remove('show');
    }
    document.getElementById('gps-nudge-btn').addEventListener('click', () => {
      dismissNudge();
      document.getElementById('gps-btn').click();
    });
    document.getElementById('gps-nudge-dismiss').addEventListener('click', dismissNudge);

    document.getElementById('access-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('access-email').value.trim();
      const password = document.getElementById('access-password').value;
      const errEl    = document.getElementById('access-error');
      const btn      = document.getElementById('access-submit');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Logging in…';
      try {
        if (!window.Auth) {
          await new Promise(r => window.addEventListener('supabase:ready', r, { once: true }));
        }
        await window.Auth.signIn({ email, password });
        const user = await window.Auth.getUser();
        if (user && (user.role === 'host' || user.role === 'admin')) {
          isPrivileged = true;
          document.getElementById('access-overlay').classList.remove('show');
        } else {
          await window.Auth.signOut();
          errEl.textContent = 'Host or admin account required.';
        }
      } catch (err) {
        errEl.textContent = err.message || 'Login failed. Please try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    });

    document.getElementById('directions-btn').addEventListener('click', () => {
      document.getElementById('directions-btn').style.display = 'none';
      document.getElementById('gps-btn').click();
    });

    document.getElementById('lot-sheet-close').addEventListener('click', closeLotSheet);
    document.getElementById('lot-sheet-backdrop').addEventListener('click', closeLotSheet);

    document.getElementById('menu-btn').addEventListener('click', openPanel);
    document.getElementById('panel-close').addEventListener('click', closePanel);
    document.getElementById('panel-backdrop').addEventListener('click', closePanel);

    // ── GPS / Navigation ──────────────────────────────────────────────
    let userMarker = null;
    let gpsWatchId = null;
    let navSteps = [];
    let navStepIdx = 0;

    // ── Voice directions ──────────────────────────────────────────────
    let voiceEnabled = false;
    let lastVoiceStepIdx = -1;
    let voiceWarned = false;   // "in X m, turn right" fired
    let voiceExecuted = false; // "turn right" fired

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate = 1.0;
      utt.pitch = 1.0;
      window.speechSynthesis.speak(utt);
    }

    document.getElementById('voice-btn').addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      const btn = document.getElementById('voice-btn');
      btn.classList.toggle('active', voiceEnabled);
      document.getElementById('voice-icon-on').style.display = voiceEnabled ? '' : 'none';
      document.getElementById('voice-icon-off').style.display = voiceEnabled ? 'none' : '';
      if (!voiceEnabled) window.speechSynthesis?.cancel();
      else if (navSteps.length) speak('Voice directions on.');
    });

    function _bearing(a, b) {
      const φ1 = a[1] * Math.PI / 180, φ2 = b[1] * Math.PI / 180;
      const Δλ = (b[0] - a[0]) * Math.PI / 180;
      return (Math.atan2(
        Math.sin(Δλ) * Math.cos(φ2),
        Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ)
      ) * 180 / Math.PI + 360) % 360;
    }

    function buildInstructions(coords) {
      const TURN_DEG = 25;
      const steps = [];
      for (let i = 1; i < coords.length - 1; i++) {
        const b1 = _bearing(coords[i - 1], coords[i]);
        const b2 = _bearing(coords[i], coords[i + 1]);
        let diff = ((b2 - b1 + 540) % 360) - 180; // -180 to +180
        if (Math.abs(diff) < TURN_DEG) continue;
        const right = diff > 0, sharp = Math.abs(diff) > 60;
        steps.push({
          coord: coords[i],
          arrow: right ? (sharp ? '→' : '↗') : (sharp ? '←' : '↖'),
          text: right ? (sharp ? 'Turn right' : 'Bear right') : (sharp ? 'Turn left' : 'Bear left'),
        });
      }
      if (coords.length > 0) {
        steps.push({ coord: coords[coords.length - 1], arrow: '⬤', text: 'Arrive at lot' });
      }
      return steps;
    }

    function _fmtDist(m) {
      return m < 1000 ? `${Math.round(m)} m` : `${(m / 1000).toFixed(1)} km`;
    }

    function updateNavBanner(userPos) {
      const banner = document.getElementById('nav-banner');
      if (!navSteps.length || gpsWatchId === null) { banner.style.display = 'none'; return; }
      // Advance past steps already reached
      while (navStepIdx < navSteps.length - 1 && _distM(userPos, navSteps[navStepIdx].coord) < 15) {
        navStepIdx++;
      }
      const step = navSteps[navStepIdx];
      const dist = _distM(userPos, step.coord);
      document.getElementById('nav-arrow').textContent = step.arrow;
      document.getElementById('nav-instruction').textContent = step.text;
      document.getElementById('nav-distance').textContent = dist > 12 ? `in ${_fmtDist(dist)}` : '';
      banner.style.display = 'flex';

      // Voice announcements
      if (voiceEnabled && window.speechSynthesis) {
        if (navStepIdx !== lastVoiceStepIdx) {
          lastVoiceStepIdx = navStepIdx;
          voiceWarned = false;
          voiceExecuted = false;
        }
        const isArrival = step.text === 'Arrive at lot';
        if (!voiceWarned && !isArrival && dist < 80 && dist > 25) {
          speak(`In ${Math.round(dist)} meters, ${step.text.toLowerCase()}`);
          voiceWarned = true;
        } else if (!voiceExecuted && dist <= 25) {
          speak(isArrival ? 'You have arrived at your destination.' : step.text);
          voiceExecuted = true;
        }
      }
    }

    function stopTracking() {
      if (gpsWatchId !== null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
      if (userMarker) { userMarker.remove(); userMarker = null; }
      window.speechSynthesis?.cancel();
      lastVoiceStepIdx = -1; voiceWarned = false; voiceExecuted = false;
      document.getElementById('gps-btn').classList.remove('tracking');
      document.getElementById('nav-banner').style.display = 'none';
      // In standalone mode, restore "Get directions" if a lot is still selected
      if (selectedLot && !guestMode && !isEmbedded) {
        clearRoute();
        document.getElementById('directions-btn').style.display = 'flex';
      }
    }

    document.getElementById('gps-btn').addEventListener('click', () => {
      if (gpsWatchId !== null) { stopTracking(); return; }
      if (!navigator.geolocation) return;
      const btn = document.getElementById('gps-btn');
      btn.classList.add('locating');

      // Get initial fix then switch to watchPosition
      navigator.geolocation.getCurrentPosition(
        ({ coords: c0 }) => {
          btn.classList.remove('locating');
          btn.classList.add('tracking');
          dismissNudge();
          map.flyTo({ center: [c0.longitude, c0.latitude], zoom: 16, duration: 900 });

          // Reroute from user's actual position if a lot is already selected
          if (selectedLot && lotsData) {
            const feature = lotsData.features.find(f => f.properties.lot_id === selectedLot);
            if (feature) showRoute(feature, [c0.longitude, c0.latitude]);
          }

          gpsWatchId = navigator.geolocation.watchPosition(
            ({ coords }) => {
              const lngLat = [coords.longitude, coords.latitude];
              if (!userMarker) {
                const dot = document.createElement('div');
                dot.className = 'user-dot';
                userMarker = new mapboxgl.Marker({ element: dot, anchor: 'center' })
                  .setLngLat(lngLat).addTo(map);
              } else {
                userMarker.setLngLat(lngLat);
              }
              updateNavBanner(lngLat);
            },
            () => stopTracking(),
            { enableHighAccuracy: true }
          );
        },
        () => {
          btn.classList.remove('locating');
          alert('Location access was denied or unavailable.');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    // ── Landmark markers on the map ───────────────────────────────────
    map.on('load', () => {
      LANDMARKS.forEach(lm => {
        const el = document.createElement('div');
        el.className = 'lm-marker';
        el.innerHTML = `
          <div class="lm-pin" style="border-color:${lm.color}">${makeSvg(lm.svg, lm.color)}</div>
          <div class="lm-label">${lm.name}</div>
        `;
        el.addEventListener('click', () => map.flyTo({ center: lm.coords, zoom: 17, duration: 900 }));

        new mapboxgl.Marker({ element: el, anchor: 'top' })
          .setLngLat(lm.coords)
          .addTo(map);
      });
    });
  </script>
</body>

</html>
